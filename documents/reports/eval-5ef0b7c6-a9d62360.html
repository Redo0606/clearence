<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Evaluation Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <h1>Evaluation Dashboard</h1>
  <h2>Summary</h2>
  <table border="1" cellpadding="8">
    <tr><th>Metric</th><th>Value</th></tr>
    <tr><td>context_recall</td><td style="background:#f44336">0.400</td></tr><tr><td>entity_recall</td><td style="background:#f44336">0.389</td></tr><tr><td>answer_correctness</td><td style="background:#ff9800">0.694</td></tr><tr><td>faithfulness</td><td style="background:#4caf50">1.000</td></tr><tr><td>answer_relevancy</td><td style="background:#ff9800">0.600</td></tr><tr><td>context_precision</td><td style="background:#4caf50">0.840</td></tr>
  </table>
  <h2>Radar Chart</h2>
  <canvas id="radarChart" width="400" height="400"></canvas>
  
  <script>
    new Chart(document.getElementById('radarChart'), {
      type: 'radar',
      data: {
        
      labels: ['context_recall', 'entity_recall', 'answer_correctness', 'faithfulness', 'answer_relevancy', 'context_precision'],
      datasets: [{ label: 'Metrics', data: [0.4, 0.3886936592818946, 0.6935566516897365, 1.0, 0.6, 0.8400000000000001], fill: true }]
    
      },
      options: { responsive: true }
    });
  </script>
</body>
</html>
